
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fio-pod-pvc-claim
  namespace: benchmark-runner
spec:
  storageClassName: ocs-storagecluster-ceph-rbd
  accessModes: [ "ReadWriteOnce" ]
  volumeMode: Filesystem
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: fio-pod-deadbeef
  namespace: benchmark-runner
  annotations:
  labels:
    app: fio-deadbeef
    type: fio-pod-deadbeef
    benchmark-uuid: deadbeef-0123-3210-cdef-01234567890abcdef
    benchmark-runner-workload: fio
spec:
  nodeSelector:
    kubernetes.io/hostname: pin-node-1
  containers:
    - name: fio-pod
      image: quay.io/benchmark-runner/fedora:43
      resources:
        requests:
          cpu: 10m
          memory: 4Gi
        limits:
          cpu: 2
          memory: 4Gi
      volumeMounts:
        - name: fio-pod-pvc-claim
          mountPath: "/workload"
        - name: fio-runner-script
          mountPath: /fio
      env:
        - name: BLOCK_SIZES
          value: "4k,8k"
        - name: IO_OPERATION
          value: "read,write"
        - name: IO_THREADS
          value: "8,8"
        - name: IO_DEPTH
          value: "4,4"
        - name: DURATION
          value: "20"
        - name: PAUSE
          value: "0"
        - name: DIRECT
          value: "1"
        - name: IOENGINE
          value: "libaio"
        - name: SIZE
          value: "1G"
        - name: LOGS_DIR
          value: "/workload/"
        - name: WORKLOAD_METHOD
          value: "/fio/fio_runner.sh"
      command: ["/bin/bash"]
      args: ["-c", "dnf install -y fio >/dev/null 2>&1 && $WORKLOAD_METHOD"]
  restartPolicy: "Never"
  volumes:
    - name: fio-pod-pvc-claim
      persistentVolumeClaim:
        claimName: fio-pod-pvc-claim
    - name: fio-runner-script
      configMap:
        name: fio-runner-script
        defaultMode: 0755
