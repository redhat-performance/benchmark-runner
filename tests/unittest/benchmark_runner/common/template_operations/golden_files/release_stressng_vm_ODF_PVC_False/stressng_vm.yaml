apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: stressng-vm-deadbeef
  namespace: benchmark-runner
  labels:
    app: stressng-vm-deadbeef
    type: stressng-vm-deadbeef
    benchmark-uuid: deadbeef-0123-3210-cdef-01234567890abcdef
    benchmark-runner-workload: stressng
spec:
  runStrategy: Once
  template:
    metadata:
      labels:
        kubevirt-vm: stressng-vm
        app: stressng-vm-deadbeef
    spec:
      nodeSelector:
        kubernetes.io/hostname: 'pin-node-1'
      domain:
        cpu:
          sockets: 2
          cores: 1
          threads: 1
        devices:
          disks:
            - disk:
                bus: virtio
              name: containerdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
        machine:
          type: ""
        resources:
          requests:
            cpu: 10m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 1Gi
      terminationGracePeriodSeconds: 180
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/benchmark-runner/fedora-container-disk:43
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: fedora
              password: fedora
              chpasswd: { expire: False }
              packages:
                - stress-ng
              runcmd:
                - echo "uuid=deadbeef-0123-3210-cdef-01234567890abcdef" > /tmp/stressng_results.txt
                - echo "runtype=sequential" >> /tmp/stressng_results.txt
                - echo "timeout=30" >> /tmp/stressng_results.txt
                - echo "cpu_stressors=1" >> /tmp/stressng_results.txt
                - echo "vm_stressors=1" >> /tmp/stressng_results.txt
                - echo "vm_bytes=128M" >> /tmp/stressng_results.txt
                - |
                  cat > /tmp/run_stressng.sh << 'EOFSCRIPT'
                  #!/bin/bash
                  # Run stress-ng and collect results
                  stress-ng --sequential --verbose --metrics-brief --timeout 30 \
                    --cpu 1 --cpu-load 100 \
                    --vm 1 --vm-bytes 128M \
                    --mem 1 2>&1 | tee /tmp/stressng_output.txt

                  # Parse results and upload to ElasticSearch
                  # Extract bogomips from output
                  cpu_bogo=$(grep "cpu.*bogo ops" /tmp/stressng_output.txt | awk '{print $4}')
                  vm_bogo=$(grep "vm.*bogo ops" /tmp/stressng_output.txt | awk '{print $4}')

                  # Create JSON payload
                  cat > /tmp/stressng_result.json << EOF
                  {
                    "uuid": "deadbeef-0123-3210-cdef-01234567890abcdef",
                    "test_user": "ripsaw",
                    "clustername": "",
                    "kind": "vm",
                    "runtype": "sequential",
                    "timeout": 30,
                    "cpu_stressors": 1,
                    "cpu_percentage": 100,
                    "vm_stressors": 1,
                    "vm_bytes": "128M",
                    "mem_stressors": 1,
                    "cpu_bogomips": ${cpu_bogo:-0},
                    "vm_bogomips": ${vm_bogo:-0},
                    "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.%6NZ)"
                  }
                  EOF

                  # Upload to ElasticSearch
                  curl -X POST "http://elasticsearch.example.com:gol9999/stressng-results/_doc" \
                    -H 'Content-Type: application/json' \
                    -d @/tmp/stressng_result.json
                  EOFSCRIPT
                  chmod +x /tmp/run_stressng.sh
                  /tmp/run_stressng.sh
                - poweroff
