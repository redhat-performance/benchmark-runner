apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: sysbench-vm-deadbeef
  namespace: benchmark-runner
  labels:
    app: sysbench-vm-deadbeef
    type: sysbench-vm-deadbeef
    benchmark-uuid: deadbeef-0123-3210-cdef-01234567890abcdef
    benchmark-runner-workload: sysbench
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        app: sysbench-vm-deadbeef
        kubevirt.io/domain: sysbench-vm-deadbeef
    spec:
      nodeSelector:
        kubernetes.io/hostname: 'pin-node-1'
      domain:
        cpu:
          cores: 2
        resources:
          requests:
            memory: 4Gi
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          networkInterfaceMultiqueue: true
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/containerdisks/fedora:43
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              password: fedora
              chpasswd: { expire: False }
              ssh_pwauth: true
              packages:
                - sysbench
                - qemu-guest-agent
              runcmd:
                - systemctl enable --now qemu-guest-agent
                - mkdir -p /opt/sysbench && chmod 777 /opt/sysbench
                - bash -c 'set -e && echo "=== SYSBENCH CPU TEST ===" > /opt/sysbench/output.tmp && sysbench cpu run --threads=2 --time=10 >> /opt/sysbench/output.tmp 2>&1 && echo "=== SYSBENCH CPU TEST DONE ===" >> /opt/sysbench/output.tmp && echo "=== SYSBENCH MEMORY TEST ===" >> /opt/sysbench/output.tmp && sysbench memory --memory-block-size=1M --memory-total-size=100G --threads=2 --max-time=10 --memory-oper=write run >> /opt/sysbench/output.tmp 2>&1 && echo "=== SYSBENCH MEMORY TEST DONE ===" >> /opt/sysbench/output.tmp && mv /opt/sysbench/output.tmp /opt/sysbench/output.txt'
