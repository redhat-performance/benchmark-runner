apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: stressng-vm-deadbeef
  namespace: benchmark-runner
  labels:
    app: stressng-vm-deadbeef
    type: stressng-vm-deadbeef
    benchmark-uuid: deadbeef-0123-3210-cdef-01234567890abcdef
    benchmark-runner-workload: stressng
spec:
  runStrategy: Once
  template:
    metadata:
      labels:
        kubevirt-vm: stressng-vm
        app: stressng-vm-deadbeef
    spec:
      nodeSelector:
        kubernetes.io/hostname: 'pin-node-1'
      domain:
        cpu:
          sockets: 
          cores: 1
          threads: 1
        devices:
          disks:
            - disk:
                bus: virtio
              name: containerdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
        machine:
          type: ""
        resources:
          requests:
            cpu: 60
            memory: 75Gi
          limits:
            cpu: 60
            memory: 75Gi
      terminationGracePeriodSeconds: 180
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/benchmark-runner/fedora-container-disk:43
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: fedora
              password: fedora
              chpasswd: { expire: False }
              packages:
                - stress-ng
                - qemu-guest-agent
              runcmd:
                - mkdir -p /opt/stressng && chmod 777 /opt/stressng
                - systemctl enable --now qemu-guest-agent
                - |
                  stress-ng --cpu 60 --cpu-load 100 --vm 1 --vm-bytes 60G --memcpy 1 --verbose --metrics-brief --timeout 120 2>&1 | tee /opt/stressng/output.txt /dev/ttyS0
                - echo "STRESSNG_COMPLETE" > /dev/ttyS0
                - touch /opt/stressng/workload_complete.signal
