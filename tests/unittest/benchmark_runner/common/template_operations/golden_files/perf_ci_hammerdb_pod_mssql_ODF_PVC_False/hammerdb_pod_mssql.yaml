
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mssql-deployment
  namespace: benchmark-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mssql
  template:
    metadata:
      labels:
        app: mssql
        type: mssql-database-server
    spec:
      nodeSelector:
        kubernetes.io/hostname: "pin-node-2"
      terminationGracePeriodSeconds: 10
      containers:
      - name: mssql
        image: quay.io/benchmark-runner/mssql:2022-rhel9
        imagePullPolicy: "IfNotPresent"
        ports:
        - containerPort: 1433
        resources:
          requests:
            cpu: 32
            memory: 32Gi
          limits:
            cpu: 32
            memory: 32Gi
        env:
          - name: MSSQL_PID
            value: "Enterprise"
          - name: ACCEPT_EULA
            value: "Y"
          - name: MSSQL_SA_PASSWORD
            value: "s3curePasswordString"
        securityContext:
          allowPrivilegeEscalation: true
        volumeMounts:
      volumes:
---
apiVersion: v1
kind: Service
metadata:
  name: mssql-deployment
  namespace: benchmark-runner
spec:
  selector:
    app: mssql
  ports:
    - protocol: TCP
      port: 1433
      targetPort: 1433
---
apiVersion: v1
kind: Pod
metadata:
  name: hammerdb-mssql-pod-deadbeef
  namespace: benchmark-runner
  labels:
    app: hammerdb-mssql-pod-deadbeef
    benchmark-uuid: deadbeef-0123-3210-cdef-01234567890abcdef
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: "pin-node-1"
  volumes:
    - name: hammerdb-creator
      configMap:
        name: hammerdb-mssql-creator
        defaultMode: 0640
    - name: hammerdb-workload
      configMap:
        name: hammerdb-mssql-workload
        defaultMode: 0640
    - name: hammerdb-mssql-results-parser
      configMap:
        name: hammerdb-mssql-results-parser
        defaultMode: 0640
  initContainers:
    - name: wait-for-mssql
      image: quay.io/benchmark-runner/hammerdb-pod:centos10
      command: ["/bin/sh", "-c"]
      args:
        - until /opt/mssql-tools18/bin/sqlcmd -S $MSSQL_HOST -U SA -P 's3curePasswordString' -C -No -Q 'SELECT 1' 2>/dev/null; do echo "Waiting for MSSQL..."; sleep 3; done
      env:
        - name: MSSQL_HOST
          value: "mssql-deployment"
  containers:
    - name: hammerdb
      image: quay.io/benchmark-runner/hammerdb-pod:centos10
      imagePullPolicy: Always
      env:
        - name: MSSQL_HOST
          value: "mssql-deployment"
      command: ["/bin/sh", "-c"]
      args:
        - |
          cd /hammer
          echo "=== STEP 1: CREATE DB ==="
          ./hammerdbcli auto /creator/createdb_mssql.tcl 2>&1 | tee /tmp/hammerdb-createdb.log
          echo "=== STEP 2: RUN WORKLOAD ==="
          ./hammerdbcli auto /workload/workload_mssql.tcl 2>&1 | tee /tmp/hammerdb-workload.log
          python3 /parse-results/parse_results.py
      volumeMounts:
        - name: hammerdb-creator
          mountPath: /creator
          readOnly: false
        - name: hammerdb-workload
          mountPath: /workload
          readOnly: false
        - name: hammerdb-mssql-results-parser
          mountPath: /parse-results
          readOnly: false
      resources:
        requests:
          cpu: "10m"
          memory: "16Gi"
        limits:
          cpu: "16"
          memory: "16Gi"
