apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: sysbench-vm-deadbeef
  namespace: benchmark-runner
  labels:
    app: sysbench-vm-deadbeef
    type: sysbench-vm-deadbeef
    benchmark-uuid: deadbeef-0123-3210-cdef-01234567890abcdef
    benchmark-runner-workload: sysbench
spec:
  runStrategy: Once
  template:
    metadata:
      labels:
        app: sysbench-vm-deadbeef
        kubevirt.io/domain: sysbench-vm-deadbeef
    spec:
      nodeSelector:
        kubernetes.io/hostname: 'pin-node-1'
      domain:
        cpu:
          cores: 80
        resources:
          requests:
            memory: 75Gi
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - masquerade: {}
              name: default
      networks:
        - name: default
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/benchmark-runner/fedora-container-disk:43
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              password: fedora
              chpasswd: { expire: False }
              ssh_pwauth: true
              packages:
                - sysbench
              runcmd:
                - mkdir -p /opt/sysbench && chmod 777 /opt/sysbench
                - bash -c 'sysbench cpu run --threads=80 --time=300 > /opt/sysbench/cpu.txt 2>&1 && sysbench memory --memory-block-size=1M --memory-total-size=100G --threads=80 --max-time=300 --memory-oper=write run > /opt/sysbench/mem.txt 2>&1 && touch /opt/sysbench/done'
