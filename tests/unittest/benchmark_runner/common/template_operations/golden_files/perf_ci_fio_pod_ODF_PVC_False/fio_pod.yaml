
---
apiVersion: v1
kind: Pod
metadata:
  name: fio-pod-deadbeef
  namespace: benchmark-runner
  annotations:
  labels:
    app: fio-deadbeef
    type: fio-pod-deadbeef
    benchmark-uuid: deadbeef-0123-3210-cdef-01234567890abcdef
    benchmark-runner-workload: fio
spec:
  selector:
    matchLabels:
      app: fio
  nodeSelector:
    kubernetes.io/hostname: pin-node-1
  containers:
    - name: fio-pod
      image: quay.io/benchmark-runner/fedora:43
      securityContext:
        runAsUser: 0
      resources:
        requests:
          cpu: 2
          memory: 4Gi
        limits:
          cpu: 2
          memory: 4Gi
      volumeMounts:
        - name: fio-ephemeral-vol
          mountPath: "/workload"
        - name: fio-runner-script
          mountPath: /fio
      env:
        - name: BLOCK_SIZES
          value: "4k,8k,32k,1M"
        - name: IO_OPERATION
          value: "read,write,randread,randwrite"
        - name: IO_THREADS
          value: "8,8,8,8"
        - name: IO_DEPTH
          value: "4,4,4,4"
        - name: DURATION
          value: "180"
        - name: PAUSE
          value: "20"
        - name: DIRECT
          value: "1"
        - name: IOENGINE
          value: "libaio"
        - name: SIZE
          value: "4G"
        - name: LOGS_DIR
          value: "/workload/"
        - name: WORKLOAD_METHOD
          value: "/fio/fio_runner.sh"
      command: ["/bin/bash"]
      args: ["-c", "dnf install -y fio >/dev/null 2>&1 && $WORKLOAD_METHOD"]
  restartPolicy: "Never"
  volumes:
    - name: fio-ephemeral-vol
      emptyDir: {}
    - name: fio-runner-script
      configMap:
        name: fio-runner-script
        defaultMode: 0755
