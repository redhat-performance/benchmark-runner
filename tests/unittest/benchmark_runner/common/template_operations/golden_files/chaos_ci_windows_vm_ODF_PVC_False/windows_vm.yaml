apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: windows-vm-deadbeef
  labels:
    kubevirt.io/vm: windows-vm-deadbeef
  namespace: benchmark-runner
spec:
  runStrategy: Halted
  template:
    metadata:
      labels:
        kubevirt.io/vm: windows-vm-deadbeef
    spec:
      domain:
        clock:
          timer:
            hpet:
              present: false
            hyperv: {}
            pit:
              tickPolicy: delay
            rtc:
              tickPolicy: catchup
          utc: {}
        cpu:
          model: host-passthrough
          cores: 1
          sockets: 1
          threads: 1
        devices:
          autoattachMemBalloon: false
          blockMultiQueue: false
          disks:
          - name: windows-vm-root-disk-deadbeef
            disk:
              bus: virtio
            bootOrder: 1
          inputs:
          - bus: virtio
            name: tablet
            type: tablet
          tpm: {}
          interfaces:
          - name: nic-0
            masquerade: {}
            model: virtio
          networkInterfaceMultiqueue: true
        features:
          acpi: {}
          apic: {}
          hyperv:
            ipi: {}
            synic: {}
            synictimer:
              direct: {}
            spinlocks:
              spinlocks: 8191
            evmcs:
              enabled: true
            relaxed: {}
            vpindex: {}
            runtime: {}
            tlbflush: {}
            frequencies: {}
            vapic: {}
          smm: {}
        firmware:
          bootloader:
            efi:
              secureBoot: false
        ioThreads:
          supplementalPoolThreadCount: 8
        ioThreadsPolicy: supplementalPool
        machine:
          type: q35
        resources:
          requests:
            cpu: 1
            memory: 2G
          limits:
            cpu: 2
            memory: 4G
      evictionStrategy: LiveMigrate
      networks:
      - name: nic-0
        pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
      - dataVolume:
          name: windows-vm-root-disk-deadbeef
        name: windows-vm-root-disk-deadbeef
  dataVolumeTemplates:
  - metadata:
      annotations:
        descheduler.alpha.kubernetes.io/evict: "true"
      name: windows-vm-root-disk-deadbeef
    spec:
      pvc:
        accessModes:
        - ReadWriteMany
        resources:
          requests:
            storage: 76Gi
        volumeMode: Block
        storageClassName: ocs-storagecluster-ceph-rbd-virtualization
      source:
        pvc:
          namespace: benchmark-runner
          name: windows-clone-dv
