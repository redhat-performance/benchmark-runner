apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: uperf-server-deadbeef
  namespace: benchmark-runner
  labels:
    app: uperf-server-deadbeef
    type: uperf-server-deadbeef
    benchmark-uuid: deadbeef-0123-3210-cdef-01234567890abcdef
    benchmark-runner-workload: uperf
    role: server
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt-vm: uperf-server
        app: uperf-server-deadbeef
    spec:
      nodeSelector:
        kubernetes.io/hostname: 'pin-node-1'
      domain:
        cpu:
          sockets: 
          cores: 
          threads: 1
        devices:
          disks:
            - disk:
                bus: virtio
              name: containerdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - name: default
              masquerade: {}
        machine:
          type: ""
        resources:
          requests:
            cpu: 8
            memory: 8Gi
          limits:
            cpu: 8
            memory: 8Gi
      terminationGracePeriodSeconds: 180
      networks:
        - name: default
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/benchmark-runner/fedora-container-disk:43
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: fedora
              password: fedora
              chpasswd: { expire: False }
              packages:
                - uperf
              runcmd:
                - uperf -s -v -P 30000 > /tmp/uperf_server.log 2>&1 &
                - sleep infinity
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: uperf-client-deadbeef
  namespace: benchmark-runner
  labels:
    app: uperf-client-deadbeef
    type: uperf-client-deadbeef
    benchmark-uuid: deadbeef-0123-3210-cdef-01234567890abcdef
    benchmark-runner-workload: uperf
    role: client
spec:
  runStrategy: Once
  template:
    metadata:
      labels:
        kubevirt-vm: uperf-client
        app: uperf-client-deadbeef
    spec:
      nodeSelector:
        kubernetes.io/hostname: 'pin-node-2'
      domain:
        cpu:
          sockets: 
          cores: 
          threads: 1
        devices:
          disks:
            - disk:
                bus: virtio
              name: containerdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - name: default
              masquerade: {}
        machine:
          type: ""
        resources:
          requests:
            cpu: 8
            memory: 8Gi
          limits:
            cpu: 8
            memory: 8Gi
      terminationGracePeriodSeconds: 180
      networks:
        - name: default
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/benchmark-runner/fedora-container-disk:43
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: fedora
              password: fedora
              chpasswd: { expire: False }
              packages:
                - uperf
              write_files:
                - path: /tmp/test.xml
                  content: |
                    <?xml version="1.0"?>
                    <profile name="test">
                      <group nthreads="1">
                        <transaction iterations="1">
                          <flowop type="connect" options="remotehost= protocol=tcp tcp_nodelay"/>
                        </transaction>
                        <transaction duration="2">
                          <flowop type="write" options="size=64"/>
                        </transaction>
                        <transaction iterations="1">
                          <flowop type="disconnect"/>
                        </transaction>
                      </group>
                    </profile>
              runcmd:
                - sleep 30
                - uperf -m /tmp/test.xml -a -e -i 1 -P 30000 > /tmp/uperf.out 2>&1
                - |
                  cat > /tmp/uperf_result.json << EOF
                  {
                    "uuid": "deadbeef-0123-3210-cdef-01234567890abcdef",
                    "kind": "vm",
                    "test_type": "stream",
                    "protocol": "tcp",
                    "message_size": 64,
                    "num_threads": 1,
                    "duration": 2,
                    "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  }
                  EOF
                  curl -X POST "http://elasticsearch.example.com:gol9999/uperf-results/_doc" \
                    -H 'Content-Type: application/json' \
                    -d @/tmp/uperf_result.json
                - poweroff
