apiVersion: v1
kind: Namespace
metadata:
  name: benchmark-runner
---
apiVersion: v1
kind: Pod
metadata:
  name: uperf-server-test123
  namespace: benchmark-runner
  labels:
    benchmark-uuid: test-uuid-123
    workload: uperf
    role: server
    app: uperf-bench-server-0-test123
    type: uperf-bench-server-test123
spec:
  containers:
  - name: benchmark
    securityContext:
      runAsUser: 0
    image: quay.io/benchmark-runner/fedora:43
    imagePullPolicy: Always
    command: ["/bin/sh", "-c"]
    args: ["dnf install -y uperf > /dev/null && uperf -s -v -P 30000"]
  restartPolicy: Never
