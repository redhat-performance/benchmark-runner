apiVersion: v1
kind: Secret
metadata:
  {% if scale -%}
  name: vdbench-cloudinit-{{ scale }}
  {%- else -%}
  name: vdbench-cloudinit
  {%- endif %}
  namespace: {{ namespace }}
stringData:
  userdata: |-
    #cloud-config
    password: centos
    chpasswd: { expire: False }
    ssh_pwauth: true
    {%- if ssh_public_key is defined and ssh_public_key %}
    ssh_authorized_keys:
      - {{ ssh_public_key }}
    {%- endif %}
    bootcmd:
      - "mkdir -p /workload || true"
      - "[ -e /dev/disk/by-id/*vdbenchdata ] && disk=$(shopt -s nullglob; basename /dev/disk/by-id/*vdbenchdata) && mkfs.ext4 /dev/disk/by-id/$disk && mount /dev/disk/by-id/$disk /workload"
    runcmd:
      - export BLOCK_SIZES={{ BLOCK_SIZES }}
      - export IO_OPERATION={{ IO_OPERATION }}
      - export IO_THREADS={{ IO_THREADS }}
      - export FILES_IO={{ FILES_IO }}
      - export IO_RATE={{ IO_RATE }}
      - export MIX_PRECENTAGE # used for mixed workload 0-100
      - export DURATION={{ DURATION }}
      - export PAUSE={{ PAUSE }}
      - export WARMUP={{ WARMUP }}
      - export FILES_SELECTION={{ FILES_SELECTION }}
      - export COMPRESSION_RATIO={{ COMPRESSION_RATIO }}
      - export RUN_FILLUP={{ RUN_FILLUP }}
      - export DIRECTORIES={{ DIRECTORIES }}
      - export FILES_PER_DIRECTORY={{ FILES_PER_DIRECTORY }}
      - export SIZE_PER_FILE={{ SIZE_PER_FILE }}
      - export LOGS_DIR={{ LOGS_DIR }}
      - mkdir -p /workload/results
      - echo @@~@@START-WORKLOAD@@~@@
      - podman --root /workload/podman run --rm -e BLOCK_SIZES="$BLOCK_SIZES" -e IO_OPERATION="$IO_OPERATION" -e IO_THREADS="$IO_THREADS" -e FILES_IO="$FILES_IO" -e IO_RATE="$IO_RATE" -e MIX_PRECENTAGE="$MIX_PRECENTAGE" -e DURATION="$DURATION" -e PAUSE="$PAUSE" -e WARMUP="$WARMUP" -e FILES_SELECTION="$FILES_SELECTION" -e COMPRESSION_RATIO="$COMPRESSION_RATIO" -e RUN_FILLUP="$RUN_FILLUP" -e DIRECTORIES="$DIRECTORIES" -e FILES_PER_DIRECTORY="$FILES_PER_DIRECTORY" -e SIZE_PER_FILE="$SIZE_PER_FILE" -e LOGS_DIR="/workload/" -v "/workload/results":"/workload" --privileged {{ vdbench_image }} {{ WORKLOAD_METHOD }}
      - cp /workload/results/*.csv /workload/ 2>/dev/null || true
      - echo @@~@@END-WORKLOAD@@~@@
---
{%- if odf_pvc == True %}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  {% if scale -%}
  name: vdbench-pvc-claim-{{ scale }}
  {%- else -%}
  name: vdbench-pvc-claim
  {%- endif %}
  namespace: {{ namespace }}
spec:
  storageClassName: ocs-storagecluster-ceph-rbd
  accessModes: [ "ReadWriteOnce" ]
  volumeMode: Block
  resources:
    requests:
      storage: {{ storage }}
---
{%- endif %}
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  {% if scale -%}
  name: vdbench-{{ kind }}-{{ trunc_uuid }}-{{ scale }}
  {%- else -%}
  name: vdbench-{{ kind }}-{{ trunc_uuid }}
  {%- endif %}
  namespace: {{ namespace }}
  labels:
    {% if scale -%}
    app: vdbench-{{ trunc_uuid }}-{{ scale }}
    type: vdbench-{{ kind }}-{{ trunc_uuid }}-{{ scale }}
    {%- else -%}
    app: vdbench-{{ trunc_uuid }}
    type: vdbench-{{ kind }}-{{ trunc_uuid }}
    {%- endif %}
    benchmark-uuid: {{ uuid }}
    benchmark-runner-workload: vdbench
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt-vm: vdbench
    spec:
      {%- if pin_node1 or scale_node %}
      nodeSelector:
        {% if scale -%}
        kubernetes.io/hostname: {{ scale_node }}
        {%- else -%}
        kubernetes.io/hostname: {{ pin_node1 }}
        {%- endif %}
      {%- endif %}
      domain:
        cpu:
          sockets: {{ sockets }}
          cores: 1
          threads: 1
        devices:
          disks:
            - disk:
                bus: virtio
              name: containerdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
            - disk:
                bus: virtio
              name: data-volume
              serial: vdbenchdata
        machine:
          type: ""
        resources:
          requests:
            cpu: {{ requests_cpu }}
            memory: {{ requests_memory }}
          limits:
            cpu: {{ limits_cpu }}
            memory: {{ limits_memory }}
      terminationGracePeriodSeconds: 180
      volumes:
{%- if odf_pvc == True %}
        - name: data-volume
          persistentVolumeClaim:
            {% if scale -%}
            claimName: vdbench-pvc-claim-{{ scale }}
            {%- else -%}
            claimName: vdbench-pvc-claim
            {%- endif %}
{%- else %}
        - name: data-volume
          emptyDisk:
            capacity: {{ storage }}
{%- endif %}
        - containerDisk:
            image: {{ fedora_container_disk }}
            imagePullPolicy: Always
          name: containerdisk
        - cloudInitNoCloud:
            secretRef:
              {% if scale -%}
              name: vdbench-cloudinit-{{ scale }}
              {%- else -%}
              name: vdbench-cloudinit
              {%- endif %}
          name: cloudinitdisk
