metadata:
  name: vdbench
template_data:
  shared:
    pin_node: {{ pin_node1 }}
    odf_pvc: {{ odf_pvc }}
    uuid: {{ uuid }}
    vdbench_image: quay.io/benchmark-runner/vdbench5.04.07:f43
    fedora_container_disk: {{ fedora_container_disk }}
  run_type:
    perf_ci:
      BLOCK_SIZES: oltp1,oltp2,oltphw,odss2,odss128,4_cache,64_cache,4,64,4_cache,64_cache,4,64
      IO_OPERATION: oltp1,oltp2,oltphw,odss2,odss128,read,read,read,read,write,write,write,write
      IO_THREADS: 8,8,8,8,16,32,4,16,4,32,4,16,4
      FILES_IO: oltp1,oltp2,oltphw,odss2,odss128,random,random,random,random,random,random,random,random
      IO_RATE: max,max,max,max,max,max,max,max,max,max,max,max,max
      MIX_PRECENTAGE:
      DURATION: 360
      PAUSE: 20
      WARMUP: 20
      FILES_SELECTION: random
      COMPRESSION_RATIO: 2
      RUN_FILLUP: "yes"
      LOGS_DIR: "/workload/"
      WORKLOAD_METHOD: "/vdbench/vdbench_runner.sh"
      DIRECTORIES: 600
      FILES_PER_DIRECTORY: 10
      SIZE_PER_FILE: 10
      limits_cpu: 2
      limits_memory: 4Gi
      requests_cpu: 2
      requests_memory: 4Gi
      storage: 64Gi
    default:
      BLOCK_SIZES: oltp1,oltp2
      IO_OPERATION: oltp1,oltp2
      IO_THREADS: 8,8
      FILES_IO: oltp1,oltp2
      IO_RATE: max,max
      MIX_PRECENTAGE:
      DURATION: 20
      PAUSE: 0
      WARMUP: 20
      FILES_SELECTION: random
      COMPRESSION_RATIO: 2
      RUN_FILLUP: "yes"
      LOGS_DIR: "/workload/"
      WORKLOAD_METHOD: "/vdbench/vdbench_runner.sh"
      DIRECTORIES: 100
      FILES_PER_DIRECTORY: 10
      SIZE_PER_FILE: 5
      limits_cpu: 2
      limits_memory: 4Gi
      requests_cpu: 10m
      requests_memory: 4Gi
      storage: 10Gi
  kind:
    vm:
      run_type:
        perf_ci:
          sockets: 2
        default:
          sockets: 2
