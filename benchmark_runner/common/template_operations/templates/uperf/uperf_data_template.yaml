metadata:
  name: uperf
files:
  - name: uperf_pod_server.yaml
    template: uperf_pod_server_template.yaml
  - name: uperf_pod_client.yaml
    template: uperf_pod_client_template.yaml
  - name: uperf_vm.yaml
    template: uperf_vm_direct_template.yaml
template_data:
  shared:
    pin_server: {{ pin_node1 }}
    pin_client: {{ pin_node2 }}
    test_user: user
    run_id: NA
    port: 30000
    service_ip: 'False'
    serviceip: false
    hostnetwork: false
    networkpolicy: false
    multus: false
    samples: 1
    pair: 1
    image: quay.io/benchmark-runner/uperf:latest
    protos:
      - tcp
  run_type:
    perf_ci:
      test_types:
        - stream
        - rr
      sizes:
        - 64
        - 1024
        - 8192
      nthrs:
        - 1
        - 8
      runtime: 60
    default:
      test_types:
        - stream
      sizes:
        - 64
      nthrs:
        - 1
      runtime: 2
  kind:
    vm:
      run_type:
        perf_ci:
          sockets: 8
          cores: 1
          limits_cpu: 8
          limits_memory: 8Gi
          requests_cpu: 8
          requests_memory: 8Gi
          net_queues: 8
        default:
          sockets: 1
          cores: 2
          limits_cpu: 2
          limits_memory: 1Gi
          requests_cpu: 10m
          requests_memory: 1Gi
          net_queues: 4
    default:
      run_type:
        perf_ci:
          limits_cpu: 8
          limits_memory: 8Gi
          requests_cpu: 8
          requests_memory: 8Gi
        default:
          limits_cpu: 2
          limits_memory: 1Gi
          requests_cpu: 10m
          requests_memory: 1Gi
