apiVersion: v1
kind: Secret
metadata:
  name: hammerdb-mariadb-cloudinit
  namespace: benchmark-runner
stringData:
  userdata: |-
    #cloud-config
    password: centos
    chpasswd: { expire: False }
    ssh_pwauth: true
    {%- if vm_ssh_public_key %}
    ssh_authorized_keys:
      - {{ vm_ssh_public_key }}
    {%- endif %}
    write_files:
      - path: /etc/my.cnf.d/hammerdb.cnf
        permissions: '0644'
        content: |
          [mysqld]
          port=3306
          ssl=0
          socket=/var/lib/mysql/mysql.sock
          key_buffer_size = 1638M
          max_allowed_packet = 200M
          table_open_cache = 400
          sort_buffer_size = 256K
          read_buffer_size = 16M
          read_rnd_buffer_size = 256K
          net_buffer_length = 2K
          thread_stack = 256K
          myisam_sort_buffer_size = 2M
          max_connections = 151

          innodb_buffer_pool_size = 8192M
          innodb_log_file_size = 2457M
          innodb_log_buffer_size = 2457M
          innodb_file_per_table = 1
          innodb_flush_method = O_DIRECT
          innodb_adaptive_flushing = 1

          [mysqldump]
          quick
          max_allowed_packet = 16M

          [mysql]
          no-auto-rehash
          socket=/var/lib/mysql/mysql.sock

          [myisamchk]
          key_buffer_size = 8M
          sort_buffer_size = 8M

          [client]
          socket=/var/lib/mysql/mysql.sock
    bootcmd:
      - "mkdir /creator"
      - "mount /dev/$(lsblk --nodeps -no name,serial | grep CVLY623300HK240C | cut -f1 -d' ') /creator"
      - "mkdir /workload"
      - "mount /dev/$(lsblk --nodeps -no name,serial | grep CVLY623300HK240D | cut -f1 -d' ') /workload"
      - "mkdir /parse-results"
      - "mount /dev/$(lsblk --nodeps -no name,serial | grep CVLY623300HK240E | cut -f1 -d' ') /parse-results"
    runcmd:
      # System setup
      - sysctl -w vm.overcommit_memory=1
      - setenforce 0 || true
      # Unlock QEMU guest agent file/exec RPCs so benchmark-runner can retrieve results
      - |
        { grep -v 'FILTER_RPC_ARGS' /etc/sysconfig/qemu-ga 2>/dev/null || true
          echo 'FILTER_RPC_ARGS=""'
        } > /tmp/qemu-ga.new && mv /tmp/qemu-ga.new /etc/sysconfig/qemu-ga
      - systemctl restart qemu-guest-agent || systemctl enable --now qemu-guest-agent || true
      - mkfs.ext4 /dev/$(lsblk --nodeps -no name,serial | grep "^.*data$" | cut -f1 -d' ') 2>&1 | tee /tmp/mkfs.log
      - mkdir -p /var/lib/mysql
      - mount /dev/$(lsblk --nodeps -no name,serial | grep "^.*data$" | cut -f1 -d' ') /var/lib/mysql
      - chown -R mysql:mysql /var/lib/mysql
      - restorecon -Rv /var/lib/mysql || true
      - sudo systemctl stop mariadb || true
      - sudo mariadb-install-db --user=mysql --datadir=/var/lib/mysql
      - sudo systemctl start mariadb
      - until mysqladmin ping --socket=/var/lib/mysql/mysql.sock --silent 2>/dev/null; do sleep 2; done
      - sudo systemctl status mariadb
      # Install HammerDB
      - export HOME=/root
      - export TMP=/tmp
      - export TEMP=/tmp
      - echo @@~@@START-WORKLOAD@@~@@
      - |
        export MYSQL_HOST=127.0.0.1
        export MYSQL_SOCKET=/var/lib/mysql/mysql.sock
        cd /hammer && ./hammerdbcli auto /creator/createdb_mariadb.tcl 2>&1 | tee /tmp/hammerdb-createdb.log
        cd /hammer && ./hammerdbcli auto /workload/workload_mariadb.tcl 2>&1 | tee /tmp/hammerdb-workload.log
      - python3 /parse-results/parse_results.py
      - echo @@~@@END-WORKLOAD@@~@@
---
{%- if storage_type == 'lso' %}
apiVersion: local.storage.openshift.io/v1
kind: LocalVolume
metadata:
  name: local-disks
  namespace: openshift-local-storage
spec:
  nodeSelector:
    nodeSelectorTerms:
    - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - {{ lso_node }}
  storageClassDevices:
    - storageClassName: local-sc
      volumeMode: Block
      devicePaths:
        - /dev/disk/by-id/{{ lso_disk_id }}
---
{%- endif %}
{%- if storage_type == 'lso' or odf_pvc == True %}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hammerdb-mariadb-pvc-claim
  namespace: benchmark-runner
spec:
  {%- if storage_type == 'lso' %}
  storageClassName: local-sc
  {%- else %}
  storageClassName: ocs-storagecluster-ceph-rbd
  {%- endif %}
  accessModes: [ "ReadWriteOnce" ]
  volumeMode: Block
  resources:
    requests:
      storage: {{ storage }}
---
{%- endif %}
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: hammerdb-mariadb-vm-{{ trunc_uuid }}
  namespace: benchmark-runner
  labels:
    app: hammerdb-mariadb-vm-{{ trunc_uuid }}
    benchmark-uuid: {{ uuid }}
    benchmark-runner-workload: hammerdb-mariadb
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt-vm: hammerdb-mariadb
    spec:
      {%- if pin_node2 %}
      nodeSelector:
        kubernetes.io/hostname: "{{ pin_node2 }}"
      {%- endif %}
      domain:
        cpu:
          sockets: {{ sockets }}
          cores: {{ cores }}
        devices:
          disks:
            - disk:
                bus: virtio
              name: containerdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
            {%- if storage_type == 'lso' or odf_pvc == True %}
            - disk:
                bus: virtio
              name: data-volume
              serial: data
            {%- endif %}
            - disk: {}
              name: hammerdb-creator-volume
              serial: CVLY623300HK240C
            - disk: {}
              name: hammerdb-workload-volume
              serial: CVLY623300HK240D
            - disk: {}
              name: hammerdb-mariadb-results-parser-volume
              serial: CVLY623300HK240E
        machine:
          type: ""
        resources:
          requests:
            memory: "{{ vm_requests_memory }}"
          limits:
            memory: "{{ vm_limits_memory }}"
      terminationGracePeriodSeconds: 180
      volumes:
        - containerDisk:
            image: quay.io/benchmark-runner/mariadb-container-disk:105-c9s
          name: containerdisk
        - cloudInitNoCloud:
            secretRef:
              name: hammerdb-mariadb-cloudinit
          name: cloudinitdisk
        {%- if storage_type == 'lso' or odf_pvc == True %}
        - persistentVolumeClaim:
            claimName: hammerdb-mariadb-pvc-claim
          name: data-volume
        {%- endif %}
        - configMap:
            name: hammerdb-mariadb-creator
          name: hammerdb-creator-volume
        - configMap:
            name: hammerdb-mariadb-workload
          name: hammerdb-workload-volume
        - configMap:
            name: hammerdb-mariadb-results-parser
          name: hammerdb-mariadb-results-parser-volume
