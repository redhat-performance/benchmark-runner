{%- if storage_type == 'lso' %}
apiVersion: local.storage.openshift.io/v1
kind: LocalVolume
metadata:
  name: local-disks
  namespace: openshift-local-storage
spec:
  nodeSelector:
    nodeSelectorTerms:
    - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - {{ lso_node }}
  storageClassDevices:
    - storageClassName: local-sc
      volumeMode: Filesystem
      fsType: ext4
      devicePaths:
        - /dev/disk/by-id/{{ lso_disk_id }}
---
{%- endif %}
{%- if storage_type == 'lso' or odf_pvc == True %}
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
    name: mariadb-persistent-storage
    namespace: benchmark-runner
spec:
    {%- if storage_type == 'lso' %}
    storageClassName: local-sc
    {%- else %}
    storageClassName: ocs-storagecluster-ceph-rbd
    {%- endif %}
    accessModes: [ "ReadWriteOnce" ]
    volumeMode: Filesystem
    resources:
      requests:
        storage: {{ storage }}
---
{%- endif %}
apiVersion: v1
kind: ConfigMap
metadata:
  name: mariadb-custom-config
  namespace: benchmark-runner
data:
  custom.conf: |
        [client-server]
        !includedir /etc/my.cnf.d
        port=3306
        ssl=0

        [mysqld]
        key_buffer_size = 1638M
        max_allowed_packet = 200M
        table_open_cache = 400
        sort_buffer_size = 256K
        read_buffer_size = 16M
        read_rnd_buffer_size = 256K
        net_buffer_length = 2K
        thread_stack = 256K
        myisam_sort_buffer_size = 2M
        max_connections = 151

        innodb_buffer_pool_size = 8192M
        innodb_log_file_size = 2457M
        innodb_log_buffer_size = 2457M
        innodb_file_per_table = 1
        innodb_flush_method = O_DIRECT
        innodb_adaptive_flushing = 1

        [mysqldump]
        quick
        max_allowed_packet = 16M

        [mysql]
        no-auto-rehash

        [myisamchk]
        key_buffer_size = 8M
        sort_buffer_size = 8M
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb-deployment
  namespace: benchmark-runner
spec:
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
        type: mariadb-database-server
    spec:
      {%- if pin_node2 %}
      nodeSelector:
        kubernetes.io/hostname: "{{ pin_node2 }}"
      {%- endif %}
      terminationGracePeriodSeconds: 10
      containers:
      - name: mariadb
        image: quay.io/benchmark-runner/mariadb:105-c9s
        imagePullPolicy: "IfNotPresent"
        ports:
        - containerPort: 3306
        resources:
          requests:
            cpu: {{ database_requests_cpu }}
            memory: {{ database_requests_memory }}
          limits:
            cpu: {{ database_limits_cpu }}
            memory: {{ database_limits_memory }}
        env:
           - name: MYSQL_USER
             value: "test"
           - name: MYSQL_PASSWORD
             value: "test"
           - name: MYSQL_ROOT_PASSWORD
             value: "mysql"
        volumeMounts:
          - name: mariadb-custom-config
            mountPath: /etc/my.cnf
            subPath: custom.conf
          {%- if storage_type == 'lso' or odf_pvc == True %}
          - name: mariadb-persistent-storage
            mountPath: /var/lib/mysql
            readOnly: false
          {%- endif %}
      volumes:
        - name: mariadb-custom-config
          configMap:
            name: mariadb-custom-config
        {%- if storage_type == 'lso' or odf_pvc == True %}
        - name: mariadb-persistent-storage
          persistentVolumeClaim:
            claimName: mariadb-persistent-storage
        {%- endif %}
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-deployment
  namespace: benchmark-runner
spec:
  selector:
    app: mariadb
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Pod
metadata:
  name: hammerdb-mariadb-pod-{{ trunc_uuid }}
  namespace: benchmark-runner
  labels:
    app: hammerdb-mariadb-pod-{{ trunc_uuid }}
    benchmark-uuid: {{ uuid }}
spec:
  restartPolicy: Never
  {%- if pin_node1 %}
  nodeSelector:
    kubernetes.io/hostname: "{{ pin_node1 }}"
  {%- endif %}
  initContainers:
    - name: wait-for-mariadb
      image: quay.io/benchmark-runner/hammerdb-pod:centos10
      command: ["/bin/sh", "-c"]
      args:
        - until mysqladmin ping -h mariadb-deployment -P 3306 --silent 2>/dev/null; do echo "Waiting for MariaDB..."; sleep 3; done
  volumes:
    - name: hammerdb-creator
      configMap:
        name: hammerdb-mariadb-creator
        defaultMode: 0640
    - name: hammerdb-workload
      configMap:
        name: hammerdb-mariadb-workload
        defaultMode: 0640
    - name: hammerdb-mariadb-results-parser
      configMap:
        name: hammerdb-mariadb-results-parser
        defaultMode: 0640
  containers:
    - name: hammerdb
      image: quay.io/benchmark-runner/hammerdb-pod:centos10
      imagePullPolicy: Always
      env:
        - name: MYSQL_HOST
          value: "mariadb-deployment"
      command: ["/bin/sh", "-c"]
      args:
        - |
          cd /hammer
          echo "=== STEP 1: CREATE DB ==="
          ./hammerdbcli auto /creator/createdb_mariadb.tcl 2>&1 | tee /tmp/hammerdb-createdb.log
          echo "=== STEP 2: RUN WORKLOAD ==="
          ./hammerdbcli auto /workload/workload_mariadb.tcl 2>&1 | tee /tmp/hammerdb-workload.log
          python3 /parse-results/parse_results.py
      volumeMounts:
        - name: hammerdb-creator
          mountPath: /creator
          readOnly: false
        - name: hammerdb-workload
          mountPath: /workload
          readOnly: false
        - name: hammerdb-mariadb-results-parser
          mountPath: /parse-results
          readOnly: false
      resources:
        requests:
          cpu: "{{ requests_cpu }}"
          memory: "{{ requests_memory }}"
        limits:
          cpu: "{{ limits_cpu }}"
          memory: "{{ limits_memory }}"
