metadata:
  name: hammerdb
files:
  - name: "hammerdb_{{ kind }}_{{ workload_extra_name }}_configmap.yaml"
    template: "hammerdb_{{ workload_extra_name }}_configmap.yaml"
template_data:
  shared:
    pin_node1: "{{ pin_node1 }}"
    pin_node2: "{{ pin_node2 }}"
    odf_pvc: {{ odf_pvc }}
    transactions: 100000
    db_min_workers: 1
    iterations: 2
    rampup: 1
    runtime: 1
  run_type:
    perf_ci:
      db_num_workers: 32
      db_warehouses: 96
      storage: 100Gi
      database_limits_cpu: 32
      database_limits_memory: 32Gi
      database_requests_cpu: 32
      database_requests_memory: 32Gi
      limits_cpu: 16
      limits_memory: 16Gi
      requests_cpu: 10m
      requests_memory: 16Gi
    default:
      db_num_workers: 2
      db_warehouses: 2
      storage: 10Gi
      database_limits_cpu: 4
      database_limits_memory: 12Gi
      database_requests_cpu: 10m
      database_requests_memory: 4Gi
      limits_cpu: 4
      limits_memory: 12Gi
      requests_cpu: 10m
      requests_memory: 4Gi
  extra:
    mariadb:
      db_image_container_disk: quay.io/benchmark-runner/mariadb-container-disk:1011-c10s
      db_image_pod: quay.io/benchmark-runner/mariadb:1011-c10s
      db_pass: mysql
      db_port: 3306
      db_type: mariadb
      db_user: root
      db_server_pod: mariadb-deployment.mariadb-db
      run_type:
        perf_ci:
          innodb_buffer_pool_size: 16384M
          innodb_log_buffer_size: 2048M
        default:
          innodb_buffer_pool_size: 4096M
          innodb_log_buffer_size: 1024M
    mssql:
      db_image_container_disk: quay.io/benchmark-runner/mssql-container-disk:2025-centos10
      db_image_pod: quay.io/benchmark-runner/mssql:2025-rhel9
      db_pass: s3curePasswordString
      db_port: 1433
      db_type: mssql
      db_user: SA
      db_server_pod: mssql-deployment.mssql-db
    postgres:
      db_image_container_disk: quay.io/benchmark-runner/postgresql-container-disk:16-c10s
      db_image_pod: quay.io/benchmark-runner/postgresql:16-c10s
      db_pass: postgres
      db_port: 5432
      db_type: pg
      db_user: postgres
      db_server_pod: postgres-deployment.postgres-db
      transactions: 200000
  kind:
    vm:
      run_type:
        perf_ci:
          sockets: 32
          cores: 1
          vm_requests_memory: 32Gi
        default:
          sockets: 1
          cores: 2
          vm_requests_memory: 8Gi
