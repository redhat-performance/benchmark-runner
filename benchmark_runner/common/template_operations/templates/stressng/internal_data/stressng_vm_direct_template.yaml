apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: stressng-vm-{{ trunc_uuid }}
  namespace: {{ namespace }}
  labels:
    app: stressng-vm-{{ trunc_uuid }}
    type: stressng-vm-{{ trunc_uuid }}
    benchmark-uuid: {{ uuid }}
    benchmark-runner-workload: stressng
spec:
  runStrategy: Once
  template:
    metadata:
      labels:
        kubevirt-vm: stressng-vm
        app: stressng-vm-{{ trunc_uuid }}
    spec:
      {%- if pin == 'true' or pin == true %}
      nodeSelector:
        kubernetes.io/hostname: '{{ pin_node }}'
      {%- endif %}
      domain:
        cpu:
          sockets: {{ sockets }}
          cores: 1
          threads: 1
        devices:
          disks:
            - disk:
                bus: virtio
              name: containerdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
        machine:
          type: ""
        resources:
          requests:
            cpu: {{ requests_cpu }}
            memory: {{ requests_memory }}
          limits:
            cpu: {{ limits_cpu }}
            memory: {{ limits_memory }}
      terminationGracePeriodSeconds: 180
      volumes:
        - name: containerdisk
          containerDisk:
            image: {{ fedora_container_disk }}
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: fedora
              password: fedora
              chpasswd: { expire: False }
              packages:
                - stress-ng
              runcmd:
                - echo "uuid={{ uuid }}" > /tmp/stressng_results.txt
                - echo "runtype={{ runtype }}" >> /tmp/stressng_results.txt
                - echo "timeout={{ timeout }}" >> /tmp/stressng_results.txt
                - echo "cpu_stressors={{ cpu_stressors }}" >> /tmp/stressng_results.txt
                - echo "vm_stressors={{ vm_stressors }}" >> /tmp/stressng_results.txt
                - echo "vm_bytes={{ vm_bytes }}" >> /tmp/stressng_results.txt
                {%- if es_url %}
                - |
                  cat > /tmp/run_stressng.sh << 'EOFSCRIPT'
                  #!/bin/bash
                  # Run stress-ng and collect results
                  stress-ng --{{ runtype }} --verbose --metrics-brief --timeout {{ timeout }} \
                    --cpu {{ cpu_stressors }} --cpu-load {{ cpu_percentage }} \
                    --vm {{ vm_stressors }} --vm-bytes {{ vm_bytes }} \
                    --mem {{ mem_stressors }} 2>&1 | tee /tmp/stressng_output.txt

                  # Parse results and upload to ElasticSearch
                  # Extract bogomips from output
                  cpu_bogo=$(grep "cpu.*bogo ops" /tmp/stressng_output.txt | awk '{print $4}')
                  vm_bogo=$(grep "vm.*bogo ops" /tmp/stressng_output.txt | awk '{print $4}')

                  # Create JSON payload
                  cat > /tmp/stressng_result.json << EOF
                  {
                    "uuid": "{{ uuid }}",
                    "test_user": "{{ test_user | default('ripsaw') }}",
                    "clustername": "{{ clustername | default('') }}",
                    "kind": "vm",
                    "runtype": "{{ runtype }}",
                    "timeout": {{ timeout }},
                    "cpu_stressors": {{ cpu_stressors }},
                    "cpu_percentage": {{ cpu_percentage }},
                    "vm_stressors": {{ vm_stressors }},
                    "vm_bytes": "{{ vm_bytes }}",
                    "mem_stressors": {{ mem_stressors }},
                    "cpu_bogomips": ${cpu_bogo:-0},
                    "vm_bogomips": ${vm_bogo:-0},
                    "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.%6NZ)"
                  }
                  EOF

                  # Upload to ElasticSearch
                  curl -X POST "{{ es_url }}/{{ es_index_name }}/_doc" \
                    -H 'Content-Type: application/json' \
                    -d @/tmp/stressng_result.json
                  EOFSCRIPT
                  chmod +x /tmp/run_stressng.sh
                  /tmp/run_stressng.sh
                {%- else %}
                - stress-ng --{{ runtype }} --verbose --metrics-brief --timeout {{ timeout }} --cpu {{ cpu_stressors }} --cpu-load {{ cpu_percentage }} --vm {{ vm_stressors }} --vm-bytes {{ vm_bytes }} --mem {{ mem_stressors }} 2>&1 | tee /tmp/stressng_output.txt
                {%- endif %}
                - poweroff
