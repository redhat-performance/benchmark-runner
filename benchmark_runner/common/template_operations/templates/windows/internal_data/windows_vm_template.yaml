apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  {% if scale -%}
  name: windows-{{ kind }}-{{ trunc_uuid }}-{{ scale }}
  labels:
    kubevirt.io/vm: windows-{{ kind }}-{{ trunc_uuid }}-{{ scale }}
  {%- else -%}
  name: windows-{{ kind }}-{{ trunc_uuid }}
  labels:
    kubevirt.io/vm: windows-{{ kind }}-{{ trunc_uuid }}
  {%- endif %}
  namespace: {{ namespace }}
spec:
  {% if run_strategy -%}
  runStrategy: Always
  {%- else -%}
  runStrategy: Halted
  {%- endif %}
  template:
    metadata:
      labels:
        {% if scale -%}
        kubevirt.io/vm: windows-{{ kind }}-{{ trunc_uuid }}-{{ scale }}
        {%- else -%}
        kubevirt.io/vm: windows-{{ kind }}-{{ trunc_uuid }}
        {%- endif %}
    spec:
      domain:
        clock:
          timer:
            hpet:
              present: false
            hyperv: {}
            pit:
              tickPolicy: delay
            rtc:
              tickPolicy: catchup
          utc: {}
        cpu:
          model: host-passthrough
          cores: 1
          sockets: {{ sockets }}
          threads: 1
        devices:
          autoattachMemBalloon: false
          blockMultiQueue: false
          disks:
          - {% if scale -%}
            name: windows-{{ kind }}-root-disk-{{ trunc_uuid }}-{{ scale }}
            {%- else -%}
            name: windows-{{ kind }}-root-disk-{{ trunc_uuid }}
            {%- endif %}
            disk:
              bus: virtio
            bootOrder: 1
          inputs:
          - bus: virtio
            name: tablet
            type: tablet
          tpm: {}
          interfaces:
          - name: nic-0
            masquerade: {}
            model: virtio
          networkInterfaceMultiqueue: true
        features:
          acpi: {}
          apic: {}
          hyperv:
            ipi: {}
            synic: {}
            synictimer:
              direct: {}
            spinlocks:
              spinlocks: 8191
            evmcs:
              enabled: true
            relaxed: {}
            vpindex: {}
            runtime: {}
            tlbflush: {}
            frequencies: {}
            vapic: {}
          smm: {}
        firmware:
          bootloader:
            efi:
              secureBoot: false
        ioThreads:
          supplementalPoolThreadCount: 8
        ioThreadsPolicy: supplementalPool
        machine:
          type: q35
        resources:
          requests:
            cpu: {{ requests_cpu }}
            memory: {{ requests_memory }}
          limits:
            cpu: {{ limit_cpu }}
            memory: {{ limit_memory }}
      evictionStrategy: LiveMigrate
      networks:
      - name: nic-0
        pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
      - dataVolume:
          {% if scale -%}
          name: windows-{{ kind }}-root-disk-{{ trunc_uuid }}-{{ scale }}
          {%- else -%}
          name: windows-{{ kind }}-root-disk-{{ trunc_uuid }}
          {%- endif %}
        {% if scale -%}
        name: windows-{{ kind }}-root-disk-{{ trunc_uuid }}-{{ scale }}
        {%- else -%}
        name: windows-{{ kind }}-root-disk-{{ trunc_uuid }}
        {%- endif %}
  dataVolumeTemplates:
  - metadata:
      annotations:
        descheduler.alpha.kubernetes.io/evict: "true"
      {% if scale -%}
      name: windows-{{ kind }}-root-disk-{{ trunc_uuid }}-{{ scale }}
      {%- else -%}
      name: windows-{{ kind }}-root-disk-{{ trunc_uuid }}
      {%- endif %}
    spec:
      pvc:
        accessModes:
        - ReadWriteMany
        resources:
          requests:
            storage: {{ storage }}
        volumeMode: Block
        storageClassName: ocs-storagecluster-ceph-rbd-virtualization
      source:
        pvc:
          namespace: {{ namespace }}
          name: windows-clone-dv
